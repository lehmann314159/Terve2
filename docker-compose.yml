services:
  terve:
    image: lehmann314159/terve:latest
    build: ./terve
    container_name: terve
    environment:
      - PORT=3000
      - VOIKKO_URL=http://voikko:8000
      - OLLAMA_URL=http://host-gateway:11434
      - OLLAMA_MODEL=qwen2.5:72b-instruct-q4_K_M
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GITHUB_CLIENT_ID=${GITHUB_CLIENT_ID}
      - GITHUB_CLIENT_SECRET=${GITHUB_CLIENT_SECRET}
      - SESSION_SECRET=${SESSION_SECRET}
      - SESSION_ENCRYPT_KEY=${SESSION_ENCRYPT_KEY}
      - BASE_URL=${BASE_URL:-https://terve.verynormalserver.com}
      - DB_PATH=/app/data/terve.db
    volumes:
      - terve-data:/app/data
    extra_hosts:
      - "host-gateway:host-gateway"
    depends_on:
      voikko:
        condition: service_healthy
    ports:
      - "3001:3000"
    restart: unless-stopped
    networks: [internal]

  voikko:
    image: lehmann314159/terve-voikko:latest
    build: ./voikko
    container_name: terve-voikko
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    networks: [internal]

volumes:
  terve-data:

networks:
  internal:
    driver: bridge
