{{define "read-content"}}
<div class="reading-layout">
    <div class="text-panel">
        <div class="text-controls">
            <button class="btn" hx-get="/articles" hx-target="#article-select" hx-indicator="#articles-loading">
                Load Articles
            </button>
            <span id="article-select"></span>
            <span id="articles-loading" class="htmx-indicator">Loading...</span>
        </div>

        <div id="article-body" class="article-body">
            <p class="placeholder-text">Load articles and select one to begin reading.</p>
        </div>
    </div>

    <div class="analysis-panel" id="analysis-panel">
        <h3>Analysis</h3>
        <p class="placeholder-text">Click a word or select a phrase in the text to see its analysis.</p>
    </div>
</div>
{{end}}
