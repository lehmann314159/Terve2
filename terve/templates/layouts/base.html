{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/htmx.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><a href="/">Terve</a></div>
        <ul class="nav-links">
            <li><a href="/" class="{{if eq .ActivePage "home"}}active{{end}}">Home</a></li>
            <li><a href="/read" class="{{if eq .ActivePage "read"}}active{{end}}">Read</a></li>
        </ul>
        <div class="nav-auth">
            {{if .User}}
                <div class="nav-user">
                    {{if .User.AvatarURL}}<img class="nav-avatar" src="{{.User.AvatarURL}}" alt="">{{end}}
                    <span class="nav-username">{{.User.Name}}</span>
                    <form method="POST" action="/auth/logout" class="nav-logout-form">
                        <button type="submit" class="nav-logout-btn">Logout</button>
                    </form>
                </div>
            {{else}}
                <a href="/auth/login" class="nav-login-btn">Sign In</a>
            {{end}}
        </div>
    </nav>

    <main class="container">
        {{template "content" .}}
    </main>

    <footer class="footer">
        <p>Terve &mdash; Finnish Reading Comprehension</p>
    </footer>

    {{template "scripts" .}}
</body>
</html>
{{end}}

{{define "scripts"}}{{end}}
