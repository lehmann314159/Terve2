{{define "base"}}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{.Title}}</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <script src="/static/js/htmx.min.js"></script>
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand"><a href="/">Terve</a></div>
        <ul class="nav-links">
            <li><a href="/" class="{{if eq .ActivePage "home"}}active{{end}}">Home</a></li>
            <li><a href="/read" class="{{if eq .ActivePage "read"}}active{{end}}">Read</a></li>
        </ul>
    </nav>

    <main class="container">
        {{template "content" .}}
    </main>

    <footer class="footer">
        <p>Terve &mdash; Finnish Reading Comprehension</p>
    </footer>

    {{template "scripts" .}}
</body>
</html>
{{end}}

{{define "scripts"}}{{end}}
